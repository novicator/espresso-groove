<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Outer vinyl -->
  <circle cx="24" cy="24" r="22" fill="#c4470a"/>
  <!-- Grooves area -->
  <circle cx="24" cy="24" r="20" fill="#a33d09"/>
  <!-- Groove lines -->
  <circle cx="24" cy="24" r="18" fill="none" stroke="#c4470a" stroke-width="0.3" opacity="0.3"/>
  <circle cx="24" cy="24" r="15" fill="none" stroke="#c4470a" stroke-width="0.3" opacity="0.3"/>
  <!-- Teal ring -->
  <circle cx="24" cy="24" r="12" fill="#2a7d7d"/>
  <!-- Cream label -->
  <circle cx="24" cy="24" r="9" fill="#e8dcc8"/>
  <!-- Inner brown -->
